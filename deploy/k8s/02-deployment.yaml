apiVersion: apps/v1
kind: Deployment
metadata:
  name: office-portal
  namespace: eurooffice-shared
  labels:
    app.kubernetes.io/name: office-portal
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: office-portal
  template:
    metadata:
      labels:
        app.kubernetes.io/name: office-portal
    spec:
      initContainers:
        - name: clone-source
          image: alpine/git:2.49.1
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              rm -rf /work/app
              git clone --depth=1 https://github.com/Autarq/office-portal.git /work/app
          volumeMounts:
            - name: app
              mountPath: /work
        - name: install-dependencies
          image: node:24-alpine
          imagePullPolicy: IfNotPresent
          workingDir: /work/app
          command:
            - sh
            - -c
            - npm ci --omit=dev
          volumeMounts:
            - name: app
              mountPath: /work
      containers:
        - name: office-portal
          image: node:24-alpine
          imagePullPolicy: IfNotPresent
          workingDir: /work/app
          command:
            - node
            - src/index.js
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
            - name: PUBLIC_BASE_URL
              value: https://office.autarq.now
            - name: DOCUMENT_SERVER_URL
              value: https://eurooffice.autarq.now
            - name: STORAGE_DIR
              value: /data
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: documentserver-jwt
                  key: jwtSecret
            - name: BASIC_AUTH_USER
              valueFrom:
                secretKeyRef:
                  name: office-portal-auth
                  key: BASIC_AUTH_USER
            - name: BASIC_AUTH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: office-portal-auth
                  key: BASIC_AUTH_PASSWORD
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          volumeMounts:
            - name: app
              mountPath: /work
            - name: data
              mountPath: /data
      volumes:
        - name: app
          emptyDir: {}
        - name: data
          persistentVolumeClaim:
            claimName: office-portal-data
