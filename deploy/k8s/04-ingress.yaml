apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: office-portal
  namespace: eurooffice-shared
  annotations:
    haproxy-ingress.github.io/ssl-redirect: "true"
    haproxy-ingress.github.io/timeout-client: 3600s
    haproxy-ingress.github.io/timeout-server: 3600s
    haproxy-ingress.github.io/timeout-tunnel: 3600s
spec:
  ingressClassName: haproxy
  tls:
    - hosts:
        - office.autarq.now
      secretName: office-portal-tls
  rules:
    - host: office.autarq.now
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: office-portal
                port:
                  name: http
